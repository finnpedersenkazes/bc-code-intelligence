type: "security-audit"
name: "Security & Compliance Audit"
description: "Comprehensive security analysis covering credentials, permissions, data classification, and vulnerability patterns"
specialist: "seth-security"

file_patterns:
  - "**/*.al"
  - "**/app.json"
file_exclusions:
  - "**/test/**"
  - "**/Test/**"
  - "**/.altestrunner/**"

phases:
  - id: "codebase_inventory"
    name: "Codebase Inventory"
    description: "Enumerate all objects and identify security-relevant code patterns"
    required: true
    mode: "autonomous"

  - id: "secrets_scan"
    name: "Secrets & Credentials Scan"
    description: "Find hardcoded secrets, API keys, passwords, and improper credential handling"
    required: true
    mode: "guided"
    entry_conditions:
      - "codebase_inventory phase completed"
    available_actions:
      - "find_hardcoded_strings"
      - "find_password_variables"
      - "find_apikey_patterns"
      - "check_isolatedstorage_usage"
      - "verify_secrettext_usage"
      - "record_finding"

  - id: "permission_audit"
    name: "Permission Set Audit"
    description: "Analyze permission sets for completeness and least-privilege compliance"
    required: true
    mode: "guided"
    entry_conditions:
      - "codebase_inventory phase completed"
    available_actions:
      - "find_permission_sets"
      - "analyze_permission_coverage"
      - "check_indirect_permissions"
      - "find_overprivileged_sets"
      - "verify_rimdx_appropriateness"
      - "record_finding"

  - id: "data_classification_audit"
    name: "Data Classification Audit"
    description: "Verify all fields have appropriate DataClassification for GDPR compliance"
    required: true
    mode: "guided"
    entry_conditions:
      - "codebase_inventory phase completed"
    available_actions:
      - "find_unclassified_fields"
      - "find_customercontent_fields"
      - "find_euii_fields"
      - "verify_sensitive_field_handling"
      - "check_tobeexternalized"
      - "record_finding"

  - id: "input_validation_scan"
    name: "Input Validation Scan"
    description: "Find SQL injection risks, unvalidated inputs, and unsafe dynamic operations"
    required: true
    mode: "guided"
    entry_conditions:
      - "permission_audit phase completed"
    available_actions:
      - "find_dynamic_filters"
      - "find_evaluate_calls"
      - "find_unvalidated_user_input"
      - "check_setfilter_interpolation"
      - "find_format_string_risks"
      - "record_finding"

  - id: "api_security_review"
    name: "API & Integration Security"
    description: "Review external API calls, authentication patterns, and data exposure"
    required: true
    mode: "guided"
    entry_conditions:
      - "input_validation_scan phase completed"
    available_actions:
      - "find_httpclient_usage"
      - "check_oauth_implementation"
      - "verify_https_enforcement"
      - "find_exposed_credentials_in_urls"
      - "check_certificate_validation"
      - "record_finding"

  - id: "event_exposure_review"
    name: "Event & API Exposure Review"
    description: "Check for sensitive data exposed through events or public APIs"
    required: true
    mode: "guided"
    entry_conditions:
      - "api_security_review phase completed"
    available_actions:
      - "find_integration_events"
      - "analyze_event_parameters"
      - "find_sensitive_data_in_events"
      - "check_public_procedure_exposure"
      - "record_finding"

  - id: "temporary_table_safety"
    name: "Temporary Table Safety"
    description: "Verify IsTemporary checks and prevent accidental real table modifications"
    required: true
    mode: "guided"
    entry_conditions:
      - "event_exposure_review phase completed"
    available_actions:
      - "find_temporary_table_usage"
      - "check_istemporary_guards"
      - "find_modify_without_istemporary"
      - "record_finding"

  - id: "recommendations"
    name: "Security Recommendations"
    description: "Generate prioritized security fixes with remediation guidance"
    required: true
    mode: "autonomous"
    entry_conditions:
      - "temporary_table_safety phase completed"

vulnerability_patterns:
  - id: "hardcoded_secret"
    name: "Hardcoded Secret"
    description: "Password, API key, or token in source code"
    severity: "critical"
    cwe: "CWE-798"
    fix: "Use IsolatedStorage with DataScope::Module"

  - id: "sql_injection"
    name: "Filter Injection"
    description: "User input concatenated into SetFilter without validation"
    severity: "critical"
    cwe: "CWE-89"
    fix: "Use parameterized filters or validate/escape input"

  - id: "missing_permission_set"
    name: "No Permission Sets Defined"
    description: "App has no permission sets - users need SUPER"
    severity: "high"
    cwe: "CWE-269"
    fix: "Define permission sets with minimum required permissions"

  - id: "overprivileged_permissions"
    name: "Overprivileged Permission Set"
    description: "Permission set grants more access than needed"
    severity: "medium"
    cwe: "CWE-269"
    fix: "Apply least privilege - grant only what's needed"

  - id: "unclassified_pii"
    name: "Unclassified Personal Data"
    description: "Fields containing personal data without DataClassification"
    severity: "high"
    regulation: "GDPR Article 30"
    fix: "Set DataClassification to CustomerContent or EUII"

  - id: "http_not_https"
    name: "HTTP Instead of HTTPS"
    description: "External calls using HTTP instead of HTTPS"
    severity: "high"
    cwe: "CWE-319"
    fix: "Use HTTPS for all external communications"

  - id: "credential_in_url"
    name: "Credentials in URL"
    description: "API key or password embedded in URL"
    severity: "critical"
    cwe: "CWE-598"
    fix: "Pass credentials in headers, not URLs"

  - id: "missing_istemporary_check"
    name: "Missing IsTemporary Guard"
    description: "Modify/Delete on record without IsTemporary check"
    severity: "medium"
    fix: "Add IsTemporary guard at procedure entry"

  - id: "sensitive_data_in_event"
    name: "Sensitive Data in Event"
    description: "Integration event exposes passwords, tokens, or PII"
    severity: "high"
    fix: "Remove sensitive fields from event parameters"

severity_levels:
  critical:
    description: "Immediate security risk - exploitable vulnerability"
    priority: "Fix before any deployment"
    compliance_impact: "Likely certification failure"

  high:
    description: "Significant security weakness"
    priority: "Fix before production release"
    compliance_impact: "May fail security review"

  medium:
    description: "Security best practice violation"
    priority: "Address in current release cycle"
    compliance_impact: "May raise concerns in audit"

  low:
    description: "Minor security improvement"
    priority: "Address when convenient"
    compliance_impact: "Unlikely to cause issues"

compliance_frameworks:
  gdpr:
    relevant_checks:
      - "data_classification_audit"
      - "sensitive_data_in_event"
      - "unclassified_pii"
    articles:
      - "Article 30: Records of processing"
      - "Article 32: Security of processing"

  appsource:
    relevant_checks:
      - "permission_audit"
      - "secrets_scan"
      - "api_security_review"
    requirements:
      - "No hardcoded credentials"
      - "Proper permission sets"
      - "Multi-tenant safe"

completion_rules:
  require_all_phases: true
  generate_remediation_code: true
  include_cwe_references: true
  flag_compliance_impacts: true

related_knowledge:
  - "domains/seth-security/secrets-isolated-storage.md"
  - "domains/seth-security/permission-set-design.md"
  - "domains/seth-security/data-classification.md"
  - "domains/seth-security/external-api-authentication.md"
  - "domains/seth-security/istemporary-safeguard-pattern.md"
